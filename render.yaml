services:
  - type: web
    name: inventory-management-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 3h
      - key: CLIENT_ORIGIN
        sync: false
      - key: JSON_BODY_LIMIT
        value: 1mb
      - key: LOGIN_RATE_LIMIT
        value: 20
      - key: MAX_UPLOAD_SIZE
        value: 2097152
      - key: ALLOW_PUBLIC_SIGNUP
        value: false
      - key: EMAIL
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
